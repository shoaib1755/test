<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section class="contact-area">
    <div class="custom-container">
        <h2 class="contact-title">Stay with us</h2>
        <p class="contact-subtitle">We ensure quality & support</p>

        <div class="form-wrapper">
            <form>
                <input type="text" class="contact-input" placeholder="Full Name">
                <input type="email" class="contact-input" placeholder="Email Address">
                <textarea class="contact-input" placeholder="Message" rows="5"></textarea>

                <div class="form-footer">
                    <div class="subscribe-wrap">
                        <input type="checkbox" id="sub">
                        <label for="sub">Subscribe Newsletter</label>
                    </div>
                    <button type="submit" class="btn-send">Send</button>
                </div>
            </form>
        </div>
    </div>
</section>

<footer class="footer-simple">
    <div class="custom-container footer-flex">
        <div class="copyright-text">
            Copyritht 2014, STRICT
        </div>
        <div class="social-links">
            <a href="#" class="social-box"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social-box"><i class="bi bi-twitter"></i></a>
            <a href="#" class="social-box"><i class="bi bi-google"></i></a>
            <a href="#" class="social-box"><i class="bi bi-linkedin"></i></a>
        </div>
    </div>
</footer>
</body>
</html>
